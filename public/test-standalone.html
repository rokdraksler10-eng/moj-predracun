<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj Predračun - TEST (Standalone)</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-text: #000000;
            --ios-text-secondary: #8E8E93;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--ios-bg);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: var(--ios-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--ios-text); }
        h2 { font-size: 20px; margin-bottom: 16px; color: var(--ios-text); }
        .btn {
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--ios-text);
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #E5E5EA;
            padding-bottom: 10px;
        }
        .tab {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            color: var(--ios-text-secondary);
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: var(--ios-blue);
            border-bottom-color: var(--ios-blue);
        }
        #debug {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Moj Predračun - TEST</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('list')">Seznam</button>
            <button class="tab" onclick="switchTab('edit')">Urejanje</button>
        </div>

        <!-- LIST VIEW -->
        <div id="view-list" class="card">
            <h2>Seznam predračunov</h2>
            <button class="btn" onclick="createNewQuote()">+ Nov predračun</button>
            <p style="margin-top: 20px; color: var(--ios-text-secondary);">
                Še ni predračunov. Klikni gumb zgoraj za ustvarjenje novega.
            </p>
        </div>

        <!-- EDIT VIEW -->
        <div id="view-edit" class="card hidden">
            <h2>Nov predračun</h2>
            <form id="quote-form" onsubmit="event.preventDefault(); saveQuote('draft');">
                <div class="form-group">
                    <label>Naziv projekta *</label>
                    <input type="text" id="project-name" required placeholder="npr. Prenova kopalnice">
                </div>
                <div class="form-group">
                    <label>Stranka *</label>
                    <input type="text" id="customer" required placeholder="Ime in priimek stranke">
                </div>
                <div class="form-group">
                    <label>Datum</label>
                    <input type="date" id="quote-date">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn" onclick="saveQuote('draft')">Shrani osnutek</button>
                    <button type="button" class="btn" style="background: #34C759;" onclick="saveQuote('sent')">Shrani in pošlji</button>
                    <button type="button" style="background: #8E8E93; color: white; border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer;" onclick="cancelEdit()">Prekliči</button>
                </div>
            </form>
        </div>

        <div id="debug">Debug log:</div>
    </div>

    <script>
        // Debug logging
        function log(msg) {
            const debug = document.getElementById('debug');
            const time = new Date().toLocaleTimeString();
            debug.innerHTML += `<br>[${time}] ${msg}`;
            debug.scrollTop = debug.scrollHeight;
            console.log(msg);
        }

        // State
        const state = {
            quotes: [],
            currentQuote: null
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            log('✅ DOM loaded');
            initializeDateFields();
            log('✅ Initialized');
        });

        function initializeDateFields() {
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.getElementById('quote-date');
            if (dateInput) {
                dateInput.value = today;
                log('✅ Date set to: ' + today);
            }
        }

        // Navigation
        function switchTab(tab) {
            log('🔘 switchTab(' + tab + ')');
            
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            // Show/hide views
            if (tab === 'list') {
                document.getElementById('view-list').classList.remove('hidden');
                document.getElementById('view-edit').classList.add('hidden');
                log('✅ Switched to list view');
            } else {
                document.getElementById('view-list').classList.add('hidden');
                document.getElementById('view-edit').classList.remove('hidden');
                log('✅ Switched to edit view');
            }
        }

        // Create new quote
        function createNewQuote() {
            log('🔘 createNewQuote() STARTED');
            
            try {
                // Reset state
                state.currentQuote = null;
                
                // Reset form
                document.getElementById('project-name').value = '';
                document.getElementById('customer').value = '';
                initializeDateFields();
                
                // Switch to edit view
                switchTab('edit');
                
                // Focus on first field
                document.getElementById('project-name').focus();
                
                log('✅ createNewQuote() COMPLETED');
                
                // Show success notification
                alert('✅ Obrazec za nov predračun je odprt!');
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                alert('❌ Napaka: ' + error.message);
            }
        }

        // Save quote
        function saveQuote(status) {
            log('🔘 saveQuote(' + status + ')');
            
            const projectName = document.getElementById('project-name').value.trim();
            const customer = document.getElementById('customer').value.trim();
            
            if (!projectName) {
                alert('❌ Vnesite naziv projekta');
                document.getElementById('project-name').focus();
                return;
            }
            
            if (!customer) {
                alert('❌ Vnesite stranko');
                document.getElementById('customer').focus();
                return;
            }
            
            // Create quote object
            const quote = {
                id: Date.now(),
                projectName: projectName,
                customer: customer,
                date: document.getElementById('quote-date').value,
                status: status,
                createdAt: new Date().toISOString()
            };
            
            // Save to state
            state.quotes.push(quote);
            state.currentQuote = quote;
            
            log('✅ Quote saved: ' + JSON.stringify(quote));
            alert('✅ Predračun "' + projectName + '" je bil uspešno shranjen!');
            
            // Switch back to list
            switchTab('list');
        }

        // Cancel edit
        function cancelEdit() {
            log('🔘 cancelEdit()');
            if (confirm('Ali ste prepričani, da želite preklicati? Neshranjene spremembe bodo izgubljene.')) {
                switchTab('list');
                log('✅ Cancelled');
            }
        }

        // Expose functions to window for debugging
        window.createNewQuote = createNewQuote;
        window.switchTab = switchTab;
        window.saveQuote = saveQuote;
        window.cancelEdit = cancelEdit;
        window.state = state;
        
        log('✅ All functions exposed to window');
    </script>
</body>
</html>
