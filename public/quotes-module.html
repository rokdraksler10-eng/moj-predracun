<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predračuni - Moj Predračun</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #F2F2F7; 
            color: #000;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        /* Header */
        .header { 
            background: white; 
            padding: 20px; 
            border-bottom: 1px solid #E5E5EA;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        
        /* Navigation */
        .nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            border-top: 1px solid #E5E5EA;
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0;
            z-index: 1000;
        }
        .nav a {
            text-decoration: none;
            color: #8E8E93;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 5px 15px;
        }
        .nav a.active { color: #007AFF; }
        .nav a span { font-size: 20px; }
        
        /* Main content */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* View switcher */
        .view { display: none; }
        .view.active { display: block; }
        
        /* Buttons */
        .btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-secondary { background: #8E8E93; }
        .btn-success { background: #34C759; }
        .btn-outline { 
            background: transparent; 
            border: 2px solid #007AFF; 
            color: #007AFF; 
        }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-row .btn { flex: 1; min-width: 120px; }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #8E8E93;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 16px;
        }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }
        
        /* Search and filters */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box input, .search-box select {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 16px;
        }
        
        /* Quote list */
        .quote-list { margin-top: 20px; }
        .quote-item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .quote-item:hover { transform: translateY(-2px); }
        .quote-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .quote-title { font-weight: 600; font-size: 16px; }
        .quote-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-draft { background: #FFF3E0; color: #E65100; }
        .status-sent { background: #E3F2FD; color: #1565C0; }
        .status-accepted { background: #E8F5E9; color: #2E7D32; }
        .status-rejected { background: #FFEBEE; color: #C62828; }
        .quote-customer { color: #8E8E93; font-size: 14px; margin-bottom: 4px; }
        .quote-amount { font-size: 18px; font-weight: 700; color: #007AFF; }
        .quote-date { font-size: 12px; color: #8E8E93; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8E8E93;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        
        /* Items table */
        .items-table { width: 100%; margin: 20px 0; }
        .items-table th, .items-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #E5E5EA;
        }
        .items-table th { color: #8E8E93; font-weight: 500; }
        .items-table input {
            width: 100%;
            padding: 8px;
            border: 1px solid #E5E5EA;
            border-radius: 6px;
        }
        
        /* Totals */
        .totals {
            background: #F2F2F7;
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }
        .total-row.grand {
            font-size: 20px;
            font-weight: 700;
            color: #007AFF;
            border-top: 2px solid #E5E5EA;
            margin-top: 8px;
            padding-top: 12px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>📋 Predračuni</h1>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- LIST VIEW -->
        <div id="list-view" class="view active">
            <!-- Search and Filter -->
            <div class="card">
                <button class="btn" id="btn-new-quote">+ Nov predračun</button>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Išči po projektu ali stranki...">
                    <select id="status-filter">
                        <option value="">Vsi statusi</option>
                        <option value="draft">Osnutek</option>
                        <option value="sent">Poslano</option>
                        <option value="accepted">Sprejeto</option>
                        <option value="rejected">Zavrnjeno</option>
                    </select>
                </div>
            </div>
            
            <!-- Quotes List -->
            <div id="quotes-container">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <h3>Ni predračunov</h3>
                    <p>Klikni "Nov predračun" za začetek</p>
                </div>
            </div>
        </div>

        <!-- EDIT VIEW -->
        <div id="edit-view" class="view">
            <div class="card">
                <div class="card-title" id="edit-title">Nov predračun</div>
                
                <form id="quote-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Naziv projekta *</label>
                            <input type="text" id="project-name" placeholder="npr. Prenova kopalnice">
                        </div>
                        <div class="form-group">
                            <label>Stranka *</label>
                            <input type="text" id="customer" placeholder="Ime in priimek">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Datum</label>
                            <input type="date" id="quote-date">
                        </div>
                        <div class="form-group">
                            <label>Veljavno do</label>
                            <input type="date" id="valid-until">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Naslov</label>
                        <input type="text" id="address" placeholder="Naslov projekta">
                    </div>
                    
                    <!-- Work Items -->
                    <h3 style="margin: 30px 0 16px;">🔧 Postavke dela</h3>
                    <div id="work-items-list"></div>
                    <button type="button" class="btn btn-outline" id="btn-add-work" style="margin-top: 10px;">+ Dodaj postavko</button>
                    
                    <!-- Materials -->
                    <h3 style="margin: 30px 0 16px;">📦 Materiali</h3>
                    <div id="materials-list"></div>
                    <button type="button" class="btn btn-outline" id="btn-add-material" style="margin-top: 10px;">+ Dodaj material</button>
                    
                    <!-- Totals -->
                    <div class="totals">
                        <div class="total-row">
                            <span>Postavke dela:</span>
                            <span id="total-work">0,00 €</span>
                        </div>
                        <div class="total-row">
                            <span>Materiali:</span>
                            <span id="total-materials">0,00 €</span>
                        </div>
                        <div class="total-row">
                            <span>Osnova za DDV:</span>
                            <span id="subtotal">0,00 €</span>
                        </div>
                        <div class="total-row">
                            <span>DDV (22%):</span>
                            <span id="vat-amount">0,00 €</span>
                        </div>
                        <div class="total-row grand">
                            <span>SKUPAJ:</span>
                            <span id="grand-total">0,00 €</span>
                        </div>
                    </div>
                    
                    <!-- Buttons -->
                    <div class="btn-row" style="margin-top: 30px;">
                        <button type="button" class="btn btn-secondary" id="btn-cancel">Prekliči</button>
                        <button type="button" class="btn" id="btn-save-draft">Shrani osnutek</button>
                        <button type="button" class="btn btn-success" id="btn-save-send">Shrani in pošlji</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav">
        <a href="index.html" class="active"><span>📋</span>Predračuni</a>
        <a href="workitems-module.html"><span>🔧</span>Postavke</a>
        <a href="calculator-module.html"><span>🧮</span>Kalkulator</a>
    </nav>

    <script>
        // ============================================
        // STATE
        // ============================================
        let quotes = JSON.parse(localStorage.getItem('quotes') || '[]');
        let currentQuote = null;
        let workItems = [];
        let materials = [];

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Page loaded');
            
            // Set default dates
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            let nextMonth = new Date();
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            document.getElementById('valid-until').value = nextMonth.toISOString().split('T')[0];
            
            // Attach event listeners
            document.getElementById('btn-new-quote').addEventListener('click', createNewQuote);
            document.getElementById('btn-cancel').addEventListener('click', cancelEdit);
            document.getElementById('btn-save-draft').addEventListener('click', () => saveQuote('draft'));
            document.getElementById('btn-save-send').addEventListener('click', () => saveQuote('sent'));
            document.getElementById('btn-add-work').addEventListener('click', addWorkItem);
            document.getElementById('btn-add-material').addEventListener('click', addMaterial);
            
            // Search and filter
            document.getElementById('search-input').addEventListener('input', renderQuotes);
            document.getElementById('status-filter').addEventListener('change', renderQuotes);
            
            // Initial render
            renderQuotes();
            
            console.log('✅ Event listeners attached');
        });

        // ============================================
        // NAVIGATION
        // ============================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewName + '-view').classList.add('active');
        }

        // ============================================
        // QUOTE MANAGEMENT
        // ============================================
        function createNewQuote() {
            console.log('🔘 Creating new quote...');
            
            currentQuote = null;
            workItems = [];
            materials = [];
            
            // Reset form
            document.getElementById('project-name').value = '';
            document.getElementById('customer').value = '';
            document.getElementById('address').value = '';
            document.getElementById('edit-title').textContent = 'Nov predračun';
            
            // Reset dates
            document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];
            let nextMonth = new Date();
            nextMonth.setMonth(nextMonth.getMonth() + 1);
            document.getElementById('valid-until').value = nextMonth.toISOString().split('T')[0];
            
            // Clear lists
            document.getElementById('work-items-list').innerHTML = '';
            document.getElementById('materials-list').innerHTML = '';
            
            updateTotals();
            showView('edit');
            
            document.getElementById('project-name').focus();
            console.log('✅ New quote form opened');
        }

        function saveQuote(status) {
            console.log('🔘 Saving quote with status:', status);
            
            const projectName = document.getElementById('project-name').value.trim();
            const customer = document.getElementById('customer').value.trim();
            
            if (!projectName) {
                alert('Prosim vnesite naziv projekta');
                document.getElementById('project-name').focus();
                return;
            }
            
            if (!customer) {
                alert('Prosim vnesite stranko');
                document.getElementById('customer').focus();
                return;
            }
            
            const quote = {
                id: currentQuote ? currentQuote.id : Date.now(),
                projectName: projectName,
                customer: customer,
                address: document.getElementById('address').value,
                date: document.getElementById('quote-date').value,
                validUntil: document.getElementById('valid-until').value,
                status: status,
                workItems: workItems,
                materials: materials,
                totalAmount: calculateTotal()
            };
            
            if (currentQuote) {
                const index = quotes.findIndex(q => q.id === quote.id);
                if (index >= 0) quotes[index] = quote;
            } else {
                quotes.push(quote);
            }
            
            localStorage.setItem('quotes', JSON.stringify(quotes));
            
            alert('✅ Predračun "' + projectName + '" je bil uspešno shranjen!');
            
            renderQuotes();
            showView('list');
        }

        function cancelEdit() {
            if (confirm('Ali ste prepričani? Neshranjene spremembe bodo izgubljene.')) {
                showView('list');
            }
        }

        function editQuote(id) {
            const quote = quotes.find(q => q.id === id);
            if (!quote) return;
            
            currentQuote = quote;
            workItems = quote.workItems || [];
            materials = quote.materials || [];
            
            document.getElementById('project-name').value = quote.projectName;
            document.getElementById('customer').value = quote.customer;
            document.getElementById('address').value = quote.address || '';
            document.getElementById('quote-date').value = quote.date || '';
            document.getElementById('valid-until').value = quote.validUntil || '';
            document.getElementById('edit-title').textContent = 'Uredi predračun';
            
            renderWorkItems();
            renderMaterials();
            updateTotals();
            
            showView('edit');
        }

        function renderQuotes() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;
            
            let filtered = quotes.filter(q => {
                const matchesSearch = !search || 
                    q.projectName.toLowerCase().includes(search) ||
                    q.customer.toLowerCase().includes(search);
                const matchesStatus = !statusFilter || q.status === statusFilter;
                return matchesSearch && matchesStatus;
            });
            
            const container = document.getElementById('quotes-container');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Ni predračunov</h3>
                        <p>${quotes.length === 0 ? 'Klikni "Nov predračun" za začetek' : 'Noben predračun ne ustreza iskanju'}</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(quote => `
                <div class="quote-item" onclick="editQuote(${quote.id})">
                    <div class="quote-header">
                        <div>
                            <div class="quote-title">${escapeHtml(quote.projectName)}</div>
                            <div class="quote-customer">${escapeHtml(quote.customer)}</div>
                        </div>
                        <span class="quote-status status-${quote.status}">${getStatusText(quote.status)}</span>
                    </div>
                    <div class="quote-amount">${formatPrice(quote.totalAmount)}</div>
                    <div class="quote-date">${formatDate(quote.date)}</div>
                </div>
            `).join('');
        }

        // ============================================
        // WORK ITEMS & MATERIALS
        // ============================================
        function addWorkItem() {
            workItems.push({ name: '', unit: 'kos', quantity: 1, price: 0 });
            renderWorkItems();
        }

        function addMaterial() {
            materials.push({ name: '', unit: 'kos', quantity: 1, price: 0 });
            renderMaterials();
        }

        function renderWorkItems() {
            const container = document.getElementById('work-items-list');
            if (workItems.length === 0) {
                container.innerHTML = '<p style="color: #8E8E93; padding: 20px;">Ni dodanih postavk</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="items-table">
                    <thead>
                        <tr><th>Naziv</th><th>Enota</th><th>Kol.</th><th>Cena</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${workItems.map((item, i) => `
                            <tr>
                                <td><input type="text" value="${item.name}" onchange="updateWorkItem(${i}, 'name', this.value)" placeholder="Postavka"></td>
                                <td><input type="text" value="${item.unit}" onchange="updateWorkItem(${i}, 'unit', this.value)" style="width: 80px;"></td>
                                <td><input type="number" value="${item.quantity}" onchange="updateWorkItem(${i}, 'quantity', this.value)" style="width: 70px;"></td>
                                <td><input type="number" value="${item.price}" onchange="updateWorkItem(${i}, 'price', this.value)" style="width: 100px;"></td>
                                <td><button onclick="removeWorkItem(${i})" style="background: #FF3B30; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;">🗑️</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderMaterials() {
            const container = document.getElementById('materials-list');
            if (materials.length === 0) {
                container.innerHTML = '<p style="color: #8E8E93; padding: 20px;">Ni dodanih materialov</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="items-table">
                    <thead>
                        <tr><th>Naziv</th><th>Enota</th><th>Kol.</th><th>Cena</th><th></th></tr>
                    </thead>
                    <tbody>
                        ${materials.map((item, i) => `
                            <tr>
                                <td><input type="text" value="${item.name}" onchange="updateMaterial(${i}, 'name', this.value)" placeholder="Material"></td>
                                <td><input type="text" value="${item.unit}" onchange="updateMaterial(${i}, 'unit', this.value)" style="width: 80px;"></td>
                                <td><input type="number" value="${item.quantity}" onchange="updateMaterial(${i}, 'quantity', this.value)" style="width: 70px;"></td>
                                <td><input type="number" value="${item.price}" onchange="updateMaterial(${i}, 'price', this.value)" style="width: 100px;"></td>
                                <td><button onclick="removeMaterial(${i})" style="background: #FF3B30; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;">🗑️</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateWorkItem(index, field, value) {
            workItems[index][field] = field === 'name' || field === 'unit' ? value : parseFloat(value) || 0;
            updateTotals();
        }

        function updateMaterial(index, field, value) {
            materials[index][field] = field === 'name' || field === 'unit' ? value : parseFloat(value) || 0;
            updateTotals();
        }

        function removeWorkItem(index) {
            workItems.splice(index, 1);
            renderWorkItems();
            updateTotals();
        }

        function removeMaterial(index) {
            materials.splice(index, 1);
            renderMaterials();
            updateTotals();
        }

        // ============================================
        // CALCULATIONS
        // ============================================
        function updateTotals() {
            const workTotal = workItems.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const materialsTotal = materials.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const subtotal = workTotal + materialsTotal;
            const vat = subtotal * 0.22;
            const grandTotal = subtotal + vat;
            
            document.getElementById('total-work').textContent = formatPrice(workTotal);
            document.getElementById('total-materials').textContent = formatPrice(materialsTotal);
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('vat-amount').textContent = formatPrice(vat);
            document.getElementById('grand-total').textContent = formatPrice(grandTotal);
        }

        function calculateTotal() {
            const workTotal = workItems.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const materialsTotal = materials.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            return (workTotal + materialsTotal) * 1.22;
        }

        // ============================================
        // UTILS
        // ============================================
        function formatPrice(amount) {
            return amount.toLocaleString('sl-SI', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('sl-SI');
        }

        function getStatusText(status) {
            const statuses = {
                'draft': 'Osnutek',
                'sent': 'Poslano',
                'accepted': 'Sprejeto',
                'rejected': 'Zavrnjeno'
            };
            return statuses[status] || status;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Expose functions to window
        window.editQuote = editQuote;
        window.updateWorkItem = updateWorkItem;
        window.updateMaterial = updateMaterial;
        window.removeWorkItem = removeWorkItem;
        window.removeMaterial = removeMaterial;

        console.log('✅ All functions loaded');
    </script>
</body>
</html>
