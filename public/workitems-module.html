<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postavke Dela - Moj Predračun</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #F2F2F7; 
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header { 
            background: white; 
            padding: 20px; 
            border-bottom: 1px solid #E5E5EA;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-secondary { background: #8E8E93; }
        .btn-danger { background: #FF3B30; }
        .btn-sm { padding: 8px 16px; font-size: 14px; }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .controls input, .controls select {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 16px;
        }
        
        /* Category tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .category-tab {
            padding: 8px 16px;
            background: white;
            border: 1px solid #E5E5EA;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .category-tab.active {
            background: #007AFF;
            color: white;
            border-color: #007AFF;
        }
        
        /* Items list */
        .items-list { margin-top: 20px; }
        .item {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .item-category { 
            display: inline-block;
            background: #F2F2F7;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #8E8E93;
        }
        .item-price { 
            font-size: 18px; 
            font-weight: 700; 
            color: #007AFF;
            margin-right: 16px;
        }
        .item-unit { font-size: 12px; color: #8E8E93; }
        .item-actions { display: flex; gap: 8px; }
        
        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8E8E93;
        }
        .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #8E8E93;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E5EA;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }
        .modal-buttons .btn { flex: 1; }
        
        /* Bottom nav */
        .nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: white; 
            border-top: 1px solid #E5E5EA;
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0;
            z-index: 100;
        }
        .nav a {
            text-decoration: none;
            color: #8E8E93;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 5px 15px;
        }
        .nav a.active { color: #007AFF; }
        .nav a span { font-size: 20px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🔧 Postavke Dela</h1>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Controls -->
        <div class="card">
            <div class="controls">
                <input type="text" id="search-input" placeholder="🔍 Išči postavko...">
                <select id="sort-select">
                    <option value="name">Naziv (A-Z)</option>
                    <option value="price-asc">Cena (nizka→visoka)</option>
                    <option value="price-desc">Cena (visoka→nizka)</option>
                </select>
            </div>
            
            <button class="btn" id="btn-new-item">+ Nova postavka</button>
            
            <!-- Category Tabs -->
            <div class="category-tabs" id="category-tabs">
                <div class="category-tab active" data-category="all">Vse</div>
            </div>
        </div>
        
        <!-- Items List -->
        <div class="items-list" id="items-list">
            <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <h3>Ni postavk</h3>
                <p>Klikni "Nova postavka" za začetek</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-title" id="modal-title">Nova postavka</div>
            <form id="item-form">
                <input type="hidden" id="item-id">
                
                <div class="form-group">
                    <label>Naziv postavke *</label>
                    <input type="text" id="item-name" placeholder="npr. Montaža oken" required>
                </div>
                
                <div class="form-group">
                    <label>Kategorija *</label>
                    <select id="item-category" required>
                        <option value="">Izberi kategorijo...</option>
                        <option value="Gradbeno">Gradbeno delo</option>
                        <option value="Električno">Električno delo</option>
                        <option value="Vodovod">Vodovod</option>
                        <option value="Ogrevanje">Ogrevanje</option>
                        <option value="Pohištvo">Pohištvo</option>
                        <option value="Keramika">Keramika</option>
                        <option value="Barvanje">Barvanje</option>
                        <option value="Drugo">Drugo</option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 16px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Enota *</label>
                        <select id="item-unit" required>
                            <option value="kos">kos</option>
                            <option value="m">m</option>
                            <option value="m2">m²</option>
                            <option value="m3">m³</option>
                            <option value="ura">ura</option>
                            <option value="dan">dan</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Cena na enoto (€) *</label>
                        <input type="number" id="item-price" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="btn-cancel">Prekliči</button>
                    <button type="submit" class="btn">Shrani postavko</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="nav">
        <a href="index.html"><span>📋</span>Predračuni</a>
        <a href="workitems-module.html" class="active"><span>🔧</span>Postavke</a>
        <a href="calculator-module.html"><span>🧮</span>Kalkulator</a>
    </nav>

    <script>
        // ============================================
        // STATE
        // ============================================
        let workItems = JSON.parse(localStorage.getItem('workItems') || '[]');
        let currentCategory = 'all';
        let editingId = null;

        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Workitems page loaded');
            
            // Add some default items if empty
            if (workItems.length === 0) {
                addDefaultItems();
            }
            
            // Event listeners
            document.getElementById('btn-new-item').addEventListener('click', openModal);
            document.getElementById('btn-cancel').addEventListener('click', closeModal);
            document.getElementById('item-form').addEventListener('submit', saveItem);
            document.getElementById('search-input').addEventListener('input', renderItems);
            document.getElementById('sort-select').addEventListener('change', renderItems);
            
            // Close modal on overlay click
            document.getElementById('modal').addEventListener('click', function(e) {
                if (e.target === this) closeModal();
            });
            
            renderItems();
            renderCategories();
            
            console.log('✅ Event listeners attached');
        });

        // ============================================
        // DEFAULT ITEMS
        // ============================================
        function addDefaultItems() {
            const defaults = [
                { id: Date.now() + 1, name: 'Rušenje stene', category: 'Gradbeno', unit: 'm2', price: 25.00 },
                { id: Date.now() + 2, name: 'Zidarsko delo', category: 'Gradbeno', unit: 'm2', price: 35.00 },
                { id: Date.now() + 3, name: 'Montaža vtičnic', category: 'Električno', unit: 'kos', price: 45.00 },
                { id: Date.now() + 4, name: 'Polaganje ploščic', category: 'Keramika', unit: 'm2', price: 55.00 },
                { id: Date.now() + 5, name: 'Montaža radiatorja', category: 'Ogrevanje', unit: 'kos', price: 120.00 },
                { id: Date.now() + 6, name: 'Barvanje sten', category: 'Barvanje', unit: 'm2', price: 15.00 },
                { id: Date.now() + 7, name: 'Montaža omare', category: 'Pohištvo', unit: 'kos', price: 80.00 },
                { id: Date.now() + 8, name: 'Priklop umivalnika', category: 'Vodovod', unit: 'kos', price: 60.00 }
            ];
            workItems = defaults;
            saveToStorage();
        }

        // ============================================
        // MODAL FUNCTIONS
        // ============================================
        function openModal() {
            console.log('🔘 Opening modal for new item');
            editingId = null;
            document.getElementById('modal-title').textContent = 'Nova postavka';
            document.getElementById('item-form').reset();
            document.getElementById('item-id').value = '';
            document.getElementById('modal').classList.add('active');
            document.getElementById('item-name').focus();
        }

        function openEditModal(id) {
            console.log('🔘 Opening modal for edit:', id);
            const item = workItems.find(i => i.id === id);
            if (!item) return;
            
            editingId = id;
            document.getElementById('modal-title').textContent = 'Uredi postavko';
            document.getElementById('item-id').value = item.id;
            document.getElementById('item-name').value = item.name;
            document.getElementById('item-category').value = item.category;
            document.getElementById('item-unit').value = item.unit;
            document.getElementById('item-price').value = item.price;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            editingId = null;
        }

        // ============================================
        // SAVE / DELETE
        // ============================================
        function saveItem(e) {
            e.preventDefault();
            console.log('🔘 Saving item...');
            
            const item = {
                id: editingId || Date.now(),
                name: document.getElementById('item-name').value.trim(),
                category: document.getElementById('item-category').value,
                unit: document.getElementById('item-unit').value,
                price: parseFloat(document.getElementById('item-price').value)
            };
            
            if (editingId) {
                const index = workItems.findIndex(i => i.id === editingId);
                if (index >= 0) workItems[index] = item;
            } else {
                workItems.push(item);
            }
            
            saveToStorage();
            renderItems();
            renderCategories();
            closeModal();
            
            alert('✅ Postavka "' + item.name + '" je bila shranjena!');
        }

        function deleteItem(id) {
            if (!confirm('Ali ste prepričani, da želite izbrisati to postavko?')) return;
            
            workItems = workItems.filter(i => i.id !== id);
            saveToStorage();
            renderItems();
            renderCategories();
        }

        function saveToStorage() {
            localStorage.setItem('workItems', JSON.stringify(workItems));
        }

        // ============================================
        // RENDERING
        // ============================================
        function renderItems() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sort = document.getElementById('sort-select').value;
            
            let filtered = workItems.filter(item => {
                const matchesSearch = !search || 
                    item.name.toLowerCase().includes(search) ||
                    item.category.toLowerCase().includes(search);
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                return matchesSearch && matchesCategory;
            });
            
            // Sort
            filtered.sort((a, b) => {
                if (sort === 'name') return a.name.localeCompare(b.name);
                if (sort === 'price-asc') return a.price - b.price;
                if (sort === 'price-desc') return b.price - a.price;
                return 0;
            });
            
            const container = document.getElementById('items-list');
            
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Ni najdenih postavk</h3>
                        <p>${workItems.length === 0 ? 'Klikni "Nova postavka" za začetek' : 'Poskusite drugo iskanje'}</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filtered.map(item => `
                <div class="item">
                    <div class="item-info">
                        <div class="item-name">${escapeHtml(item.name)}</div>
                        <span class="item-category">${escapeHtml(item.category)}</span>
                    </div>
                    <div>
                        <div class="item-price">${item.price.toFixed(2)} €</div>
                        <div class="item-unit">/${item.unit}</div>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-sm btn-secondary" onclick="openEditModal(${item.id})">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCategories() {
            const categories = [...new Set(workItems.map(i => i.category))].sort();
            const container = document.getElementById('category-tabs');
            
            let html = `<div class="category-tab ${currentCategory === 'all' ? 'active' : ''}" data-category="all">Vse</div>`;
            
            categories.forEach(cat => {
                html += `<div class="category-tab ${currentCategory === cat ? 'active' : ''}" data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</div>`;
            });
            
            container.innerHTML = html;
            
            // Attach click handlers
            container.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    currentCategory = this.dataset.category;
                    renderCategories();
                    renderItems();
                });
            });
        }

        // ============================================
        // UTILS
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Expose functions to window for onclick handlers
        window.openEditModal = openEditModal;
        window.deleteItem = deleteItem;

        console.log('✅ All functions loaded');
    </script>
</body>
</html>
