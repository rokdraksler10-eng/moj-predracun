<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moj Predračun | Professional</title>
  <style>
    :root {
      --ios-blue: #007AFF;
      --ios-bg: #F2F2F7;
      --ios-card: #FFFFFF;
      --ios-text: #000000;
      --ios-text-secondary: #8E8E93;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ios-bg);
      min-height: 100vh;
    }
    .page { display: none; height: calc(100vh - 80px); }
    .page.active { display: block; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 1000;
    }
    .nav button {
      background: none;
      border: none;
      padding: 8px 12px;
      font-size: 11px;
      color: #8E8E93;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .nav button.active { color: var(--ios-blue); }
    .nav button svg { width: 24px; height: 24px; stroke-width: 1.5; }
  </style>
</head>
<body>
  <div id="page-quotes" class="page active">
    <iframe src="quotes-module.html" title="Predračuni"></iframe>
  </div>
  <div id="page-items" class="page">
    <iframe src="workitems-module.html" title="Postavke"></iframe>
  </div>
  <div id="page-materials" class="page">
    <iframe src="materials-module.html" title="Materiali"></iframe>
  </div>
  <div id="page-calculator" class="page">
    <iframe src="calculator-module.html" title="Kalkulator"></iframe>
  </div>
  <div id="page-settings" class="page">
    <div style="padding: 40px; text-align: center;">
      <h1 style="margin-bottom: 20px;">Nastavitve</h1>
      <p style="color: var(--ios-text-secondary);">Moj Predračun v3.0 Professional</p>
      <p style="margin-top: 20px; color: var(--ios-text-secondary);">Status: Online ✅</p>
    </div>
  </div>

  <nav class="nav">
    <button onclick="show('quotes')" id="nav-quotes" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
      Predračuni
    </button>
    <button onclick="show('items')" id="nav-items">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line></svg>
      Postavke
    </button>
    <button onclick="show('materials')" id="nav-materials">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
      Materiali
    </button>
    <button onclick="show('calculator')" id="nav-calculator">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="2" width="16" height="20" rx="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line></svg>
      Kalkulator
    </button>
    <button onclick="show('settings')" id="nav-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82V9a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9z"></path></svg>
      Nastavitve
    </button>
  </nav>

  <script>
    function show(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      document.getElementById('nav-' + page).classList.add('active');
    }
  </script>
</body>
</html>
